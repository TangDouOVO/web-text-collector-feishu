<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书文档收藏助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>飞书文档收藏助手</h1>
    
    <div class="status-section">
      <div id="statusMessage" class="status-message">
        <p>点击下方按钮进入完整配置页面</p>
      </div>
    </div>
    
    <div class="action-section">
      <button id="openOptions" class="btn-primary">打开配置页面</button>
    </div>
    
    <div class="help-section">
      <h2>使用说明</h2>
      <ol>
        <li>点击「打开配置页面」按钮</li>
        <li>填写飞书应用配置信息</li>
        <li>在网页中选中任意文本，点击收藏按钮</li>
      </ol>
      <a href="https://open.feishu.cn" target="_blank" class="help-link">前往飞书开放平台</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
